<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --skool-blue: #2929FF;
      --skool-yellow: #f7d37c;
      --skool-bg: #F7F7F7;
    }
    body {
      width: 320px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: white;
      margin: 0;
    }
    .header {
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
    }
    .logo-text {
      display: flex;
      align-items: center;
      font-weight: 900;
      font-size: 32px;
      letter-spacing: -2px;
    }
    .field-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 900;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px;
      box-sizing: border-box;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      font-weight: 700;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--skool-blue);
    }
    .sync-btn {
      width: 100%;
      background: var(--skool-yellow);
      color: #1a1a1a;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(247, 211, 124, 0.3);
      margin-bottom: 12px;
    }
    .sync-btn:hover {
      background: #f5c75d;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(247, 211, 124, 0.4);
    }
    .sync-btn:active {
      transform: scale(0.98);
    }
    #status {
      width: 100%;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-align: center;
      box-sizing: border-box;
    }
    #status.error {
      background: #fee2e2;
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-text">
      <span style="color: #2929FF">s</span>
      <span style="color: #D1432A">k</span>
      <span style="color: #D9A75B">o</span>
      <span style="color: #6DBBEE">o</span>
      <span style="color: #C14B3A">l</span>
    </div>
  </div>
  
  <div class="field-group">
    <label>Pages to Capture</label>
    <input type="number" id="pageCount" value="1" min="1" max="10">
  </div>

  <button id="syncBtn" class="sync-btn">Start Harvesting</button>
  
  <div id="status">Ready to harvest</div>

  <script src="popup.js"></script>
</body>
</html>
